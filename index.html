<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="background-animation"></div>

<header class="navbar">
    <div class="logo-container">
        <img src="public/logo.png" alt="ÉDIT MARKET PRO" class="logo">
    </div>

    <input
        type="text"
        id="searchInput"
        placeholder="Rechercher un produit..."
        class="search-bar"
    >
</header>

<section class="hero">
    <h1>Templates Premium</h1>

    <p>
        After Effects, Premiere Pro, LUTs,
        Motion Graphics et plus.
    </p>

    <a href="#products" class="hero-btn">
        Explorer les produits
    </a>
</section>

<section class="popular-section">
    <h2>Produits Populaires</h2>

    <div id="popularProducts" class="products-grid">
    </div>
</section>

<section id="products" class="products-section">
    <h2>Tous les Produits</h2>

    <div id="productsContainer" class="products-grid">
    </div>
</section>

<footer class="footer">

    <img src="public/logo.png" alt="Logo" class="footer-logo">

    <div class="social-links">
        <a href="#" id="tiktokLink">TikTok</a>
        <a href="#" id="instagramLink">Instagram</a>
        <a href="#" id="facebookLink">Facebook</a>
        <a href="#" id="youtubeLink">YouTube</a>
    </div>

    <p>
        © 2026 ÉDIT MARKET PRO
    </p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
