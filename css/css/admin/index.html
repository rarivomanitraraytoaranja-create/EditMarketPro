<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ÉDIT MARKET PRO</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:10px;
}

button{
background:#8B5CF6;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

textarea{
min-height:120px;
}

#result{
white-space:pre-wrap;
margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>ÉDIT MARKET PRO ADMIN</h1>

<div class="card">

<h2>Ajouter un produit</h2>

<input id="nom" placeholder="Nom du produit">

<input id="prix" placeholder="Prix">

<input id="categorie" placeholder="Catégorie">

<input id="image" placeholder="Image">

<input id="video" placeholder="Lien vidéo">

<input id="paymentUrl" placeholder="Lien Vanilla Pay">

<input id="downloadUrl" placeholder="Lien téléchargement">

<select id="popular">
<option value="true">Populaire</option>
<option value="false">Non populaire</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<button onclick="generateJson()">
Générer le produit
</button>

</div>

<div class="card">

<h2>Réseaux sociaux</h2>

<input placeholder="TikTok">
<input placeholder="Instagram">
<input placeholder="Facebook">
<input placeholder="YouTube">

</div>

<div class="card">

<h2>JSON généré</h2>

<div id="result"></div>

</div>

</div>

<script>

function generateJson(){

const product = {

id: Date.now(),

nom: document.getElementById("nom").value,

image: document.getElementById("image").value,

video: document.getElementById("video").value,

description: document.getElementById("description").value,

prix: document.getElementById("prix").value,

categorie: document.getElementById("categorie").value,

downloads: 0,

popular:
document.getElementById("popular").value === "true",

paymentUrl:
document.getElementById("paymentUrl").value,

downloadUrl:
document.getElementById("downloadUrl").value

};

document.getElementById("result").textContent =
JSON.stringify(product,null,2);

}

</script>

</body>
</html>
