<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Produit</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">

<a href="index.html" style="text-decoration:none;color:white;">
← Retour à l'accueil
</a>

</header>

<main class="product-page">

<img
id="productImage"
class="product-page-image"
src=""
alt=""
>

<h1 id="productTitle"></h1>

<p id="productCategory"></p>

<p id="productPrice"></p>

<p id="productDownloads"></p>

<div class="video-container">

<iframe
id="productVideo"
width="100%"
height="500"
src=""
frameborder="0"
allowfullscreen>
</iframe>

</div>

<p id="productDescription"></p>

<a
id="buyButton"
class="buy-btn"
href="#"
target="_blank"
>
Acheter maintenant
</a>

</main>

<script>

async function loadProduct() {

    try {

        const response =
        await fetch("data/products.json");

        const products =
        await response.json();

        const params =
        new URLSearchParams(window.location.search);

        const productId =
        parseInt(params.get("id"));

        const product =
        products.find(
            p => p.id === productId
        );

        if (!product) {

            document.body.innerHTML =
            "<h1 style='padding:40px'>Produit introuvable</h1>";

            return;

        }

        document.getElementById("productImage").src =
        product.image;

        document.getElementById("productImage").alt =
        product.nom;

        document.getElementById("productTitle").textContent =
        product.nom;

        document.getElementById("productCategory").textContent =
        "Catégorie : " + product.categorie;

        document.getElementById("productPrice").textContent =
        "Prix : " + product.prix;

        document.getElementById("productDownloads").textContent =
        "Téléchargements : " + product.downloads;

        document.getElementById("productVideo").src =
        product.video;

        document.getElementById("productDescription").textContent =
        product.description;

        document.getElementById("buyButton").href =
        product.paymentUrl;

        document.title =
        product.nom + " - ÉDIT MARKET PRO";

    }

    catch(error) {

        console.error(error);

        document.body.innerHTML =
        "<h1 style='padding:40px'>Erreur de chargement</h1>";

    }

}

loadProduct();

</script>

</body>
</html>
